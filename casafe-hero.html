        syms.map((s,i)=>{const op=fi(s.start,s.start+0.9);return E('div',{key:i,style:{display:'flex',alignItems:'center',gap:24,background:'rgba(201,168,76,0.04)',border:'1px solid rgba(201,168,76,0.14)',borderRadius:3,padding:'24px 32px',opacity:op,transform:`translateY(${(1-op)*40}px)`}},mkIcon(s.icon,36,_muted),E('span',{style:{color:_cream,fontSize:26,fontWeight:300,fontFamily:_sans}},s.label));})

    const sc3=fio(9.2,11.0,13.2,14.2);

      E('div',{style:{fontFamily:_serif,fontStyle:'italic',fontSize:86,fontWeight:600,color:_green,lineHeight:1.2,opacity:fi(10.3,11.7),transform:ty(10.3,11.7,50),textShadow:`0 0 80px ${_green}40`}},'É o seu espaço.')
    );

    const sc4=fio(13.2,15.5,18.5,19.5);

        E('div',{style:{width:300,height:1,background:`linear-gradient(90deg,transparent,${_gold},transparent)`,margin:'6px 0'}}),

      )

    const bens=[{icon:'moon',label:'Sono restaurado',start:19.0},{icon:'wave',label:'Ansiedade reduzida',start:20.0},{icon:'sun',label:'Energia renovada',start:21.0},{icon:'link',label:'Harmonia familiar',start:22.0},{icon:'gem',label:'Foco e clareza',start:23.0}];

      E('div',{style:{display:'flex',flexDirection:'column',gap:28,width:860}},
        bens.map((b,i)=>{const op=fi(b.start,b.start+0.7);return E('div',{key:i,style:{display:'flex',alignItems:'center',gap:32,borderBottom:'1px solid rgba(201,168,76,0.1)',paddingBottom:28,opacity:op,transform:`translateX(${(1-op)*-80}px)`}},mkIcon(b.icon,42,_green),E('span',{style:{fontSize:32,fontWeight:300,color:_cream,fontFamily:_sans}},b.label));})
      )
    );

    // Persistent CTA overlay
    const ctaOp = fi(24.0,26.0);
    const cta = ctaOp>0 && E('div',{style:{position:'absolute',bottom:0,left:0,right:0,height:300,background:'linear-gradient(to top,rgba(8,20,12,0.95) 0%,rgba(8,20,12,0.6) 60%,transparent 100%)',display:'flex',alignItems:'flex-end',justifyContent:'center',paddingBottom:52,flexDirection:'column',alignItems:'center',gap:18,opacity:ctaOp}},
      E('a',{href:'#',style:{background:'transparent',color:_green,padding:'20px 80px',border:`1px solid ${_green}`,borderRadius:2,fontFamily:_sans,fontSize:20,fontWeight:500,letterSpacing:'0.14em',textTransform:'uppercase',textDecoration:'none',boxShadow:`0 0 40px ${_green}30`,transform:`translateY(${(1-fi(24.5,26.0))*30}px)`}},'Entre em contato pelo site →'),
      E('div',{style:{fontFamily:_sans,fontSize:15,color:`${_green}80`,letterSpacing:'0.24em',textTransform:'uppercase'}},'casafe.app.br · 30 minutos · sem compromisso')
    );

    return E('div',{'data-screen-label':`t=${Math.floor(t)}s`,style:{position:'relative',width:1920,height:1080,overflow:'hidden',background:'#0e1f14',fontFamily:_sans}},
      rings,s1,s2,s3,s4,s5,cta);
  }

  renderVals() {
    const E  = React.createElement;
    const sc = this._sc;
    const hero = E('div',{style:{position:'absolute',left:'50%',top:'50%',width:1920,height:1080,transform:`translate(-50%,-50%) scale(${sc})`,transformOrigin:'center center',overflow:'hidden'}},

}
